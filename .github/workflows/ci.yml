name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.30.1"
  PYTHON_VERSION: "3.11"

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Gitleaks (working tree)
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact=100 --no-git

  quality:
    name: Ruff, Mypy & Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check app tests

      - name: Ruff format (check only)
        run: uv run ruff format app tests --check

      - name: Mypy
        run: uv run mypy app

      - name: Pytest
        run: uv run pytest -v
